name: CI

on:
  push:
    branches: [main, dev-*]
  pull_request:
    branches: [main]

env:
  GO_VERSION: "1.26"

jobs:
  test:
    name: Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}
          cache: true

      - name: Run tests
        run: go test ./... -count=1 -timeout 600s

  build:
    name: Build
    runs-on: ubuntu-latest
    needs: test
    steps:
      - uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}
          cache: true

      - name: Build CSS
        run: npx --yes tailwindcss@3.4.19 -i static/css/tailwind.src.css -o static/css/style.css --minify

      - name: Generate Templ code
        run: go run github.com/a-h/templ/cmd/templ@v0.3.906 generate

      - name: Build binary
        run: go build -o raevtar ./cmd/server/

      - name: Upload binary
        uses: actions/upload-artifact@v4
        with:
          name: raevtar-linux-amd64
          path: raevtar
          retention-days: 7
